name: 機能提案 / Feature request
description: 改善・追加の提案
labels: ["enhancement"]
body:
  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: 解決したい課題と提案する変更
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案・備考
    validations:
      required: false
